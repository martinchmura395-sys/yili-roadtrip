<style>
/* ============================================================
   一家四口新疆伊犁6天亲子自驾电子路书
   视觉设计说明（design tokens）：
   ------------------------------------------------------------
   色板：
     --ink       #4A4238  墨灰（正文/线条，仿手账钢笔墨色）
     --paper     #F6F1E4  天山雪白（纸张底色，带暖调）
     --paper-2   #EEE6D3  纸张阴影层（卡片底）
     --lake      #2E6C8E  赛里木湖蓝
     --lake-deep #1F4E68  深湖蓝（用于强调/按钮）
     --steppe    #6B7A45  草原绿
     --lavender  #9B87B5  薰衣草紫
     --timber    #8B5E3C  木屋棕（琼库什台）
     --clay      #C97B5A  夕阳橙（唯一强调色，用于“现在/下一站”）
     --road      #9C9284  公路灰
   字体：
     展示字（克制使用）：'Ma Shan Zheng'（毛笔手写体）——仅用于大标题/日期编号
     正文：'Noto Sans SC'
     数据/标签：'Caveat'（拉丁手写体，用于车程数字、时间轴刻度）
   版式概念：
     整本路书做成“手账本”——奶油纸张底 + 缝线装订感（左侧虚线缝线条）
     串起每天的定位徽章，模拟旅行手账内页装订。
   签名元素：
     贯穿全书的“缝线路线”（stitched trail）：一条手绘虚线，
     从封面一直延伸到每一天的页眉，串起当天的地点徽章，
     体现“自驾串线”的核心概念。
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;600;700;900&family=Caveat:wght@500;700&display=swap');

:root{
  --ink:#4A4238;
  --ink-soft:#6b6154;
  --paper:#F6F1E4;
  --paper-2:#EEE6D3;
  --paper-3:#F9F5EA;
  --lake:#2E6C8E;
  --lake-deep:#1F4E68;
  --steppe:#6B7A45;
  --lavender:#9B87B5;
  --timber:#8B5E3C;
  --clay:#C97B5A;
  --road:#9C9284;
  --line: rgba(74,66,56,0.16);
  --shadow: 0 6px 18px rgba(74,66,56,0.10);
  --shadow-sm: 0 2px 8px rgba(74,66,56,0.08);
  --radius: 22px;
  --radius-sm: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  background:
    radial-gradient(1200px 800px at 10% -10%, #fbf7ec 0%, transparent 60%),
    var(--paper);
  color:var(--ink);
  font-family:'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height:100vh;
  overscroll-behavior-y: none;
}

/* 纸张纹理：细噪点 + 边缘晕染，避免平板电子感 */
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.5;
  background-image:
    radial-gradient(rgba(74,66,56,0.035) 1px, transparent 1px);
  background-size: 3px 3px;
}

.app{
  position:relative;
  z-index:1;
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom: calc(84px + var(--safe-bottom));
}

/* ---------- 顶部通用 ---------- */
.hand-title{ font-family:'Ma Shan Zheng', cursive; letter-spacing:.02em; }
.num{ font-family:'Caveat', cursive; }

.top-thread{
  position:relative;
  height:34px;
  margin: 0 20px;
}
.top-thread svg{ width:100%; height:100%; display:block; }

/* ---------- 页面容器 ---------- */
.page{ padding: 6px 20px 28px; }
.page.hidden{ display:none; }

/* ---------- 封面 ---------- */
.cover{
  position:relative;
  margin: 10px 0 22px;
  padding: 46px 26px 30px;
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(46,108,142,.14), rgba(46,108,142,0) 55%),
    var(--paper-3);
  box-shadow: var(--shadow);
  border:1px solid var(--line);
  overflow:hidden;
  text-align:center;
}
.cover .washi{
  position:absolute; top:-10px; left:50%; transform:translateX(-50%) rotate(-2deg);
  width:120px; height:34px; background:rgba(201,123,90,.35);
  border:1px solid rgba(201,123,90,.5);
}
.cover-eyebrow{
  font-family:'Caveat', cursive; font-size:20px; color:var(--lake-deep);
  letter-spacing:.06em;
}
.cover h1{
  font-family:'Ma Shan Zheng', cursive;
  font-size: 40px;
  line-height:1.35;
  margin: 10px 0 8px;
  color: var(--ink);
}
.cover p.sub{
  font-size:13.5px; color:var(--ink-soft); line-height:1.9;
  margin: 6px auto 18px; max-width: 320px;
}
.cover-illust{ margin: 6px auto 14px; }
.cover-meta{
  display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
  margin-top: 6px;
}
.tag{
  font-size:12px; padding:5px 12px; border-radius:999px;
  border:1px solid var(--line); color:var(--ink-soft); background:#fff8ec;
}

/* ---------- 卡片通用 ---------- */
.card{
  background: var(--paper-3);
  border:1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 18px;
  margin-bottom: 16px;
  position:relative;
}
.card h2, .card h3{ margin:0 0 10px; }
.section-title{
  font-family:'Ma Shan Zheng', cursive;
  font-size: 22px;
  color: var(--lake-deep);
  margin: 22px 4px 10px;
}
.section-sub{ font-size:12.5px; color:var(--ink-soft); margin: -6px 4px 12px; }

/* ---------- 底部标签导航 ---------- */
.tabbar{
  position:fixed; left:0; right:0; bottom:0;
  z-index:20;
  display:flex; overflow-x:auto; gap:2px;
  padding: 8px 8px calc(8px + var(--safe-bottom));
  background: rgba(246,241,228,.92);
  backdrop-filter: blur(8px);
  border-top:1px solid var(--line);
  -ms-overflow-style:none; scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{ display:none; }
.tab-btn{
  flex: 0 0 auto;
  font-size:12.5px;
  padding:8px 13px;
  border-radius:999px;
  border:1px solid transparent;
  background:transparent;
  color:var(--ink-soft);
  font-family:'Noto Sans SC', sans-serif;
  white-space:nowrap;
}
.tab-btn.active{
  background: var(--ink);
  color: var(--paper-3);
  box-shadow: var(--shadow-sm);
}

/* ---------- 日程时间轴（总览） ---------- */
.timeline{ position:relative; padding-left: 26px; }
.timeline::before{
  content:""; position:absolute; left:9px; top:6px; bottom:6px; width:2px;
  background-image: linear-gradient(var(--road), var(--road));
  background-size: 2px 8px; background-repeat: repeat-y;
  opacity:.5;
}
.tl-item{ position:relative; padding-bottom:18px; }
.tl-item:last-child{ padding-bottom:0; }
.tl-dot{
  position:absolute; left:-26px; top:2px; width:18px; height:18px; border-radius:50%;
  border:3px solid var(--paper); box-shadow:0 0 0 1px var(--line);
}
.tl-day{ font-family:'Caveat', cursive; font-size:20px; font-weight:700; }
.tl-title{ font-size:14.5px; font-weight:600; margin:2px 0 3px; }
.tl-meta{ font-size:12px; color:var(--ink-soft); }

/* ---------- Day 卡片页 ---------- */
.day-head{
  display:flex; align-items:baseline; gap:10px; margin-bottom:6px;
}
.day-badge{
  font-family:'Ma Shan Zheng', cursive; font-size:30px; color:#fff;
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex:0 0 auto; box-shadow: var(--shadow-sm);
}
.day-headline h2{ font-size:17px; margin:0; }
.day-headline .date{ font-size:12px; color:var(--ink-soft); }
.day-summary{ font-size:13px; color:var(--ink-soft); margin: 8px 2px 14px; line-height:1.7; }

.illust-frame{
  border-radius: var(--radius-sm);
  overflow:hidden;
  border:1px solid var(--line);
  background:#fff;
  margin-bottom:14px;
  box-shadow: var(--shadow-sm);
}
.illust-frame svg{ display:block; width:100%; height:auto; }
.illust-caption{
  font-size:11.5px; color:var(--ink-soft); text-align:center; padding:6px 8px 10px;
  font-family:'Caveat', cursive; font-size:15px;
}

.chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin: 6px 0 4px; }
.chip{
  font-size:12px; padding:6px 11px; border-radius:999px;
  background: var(--paper-2); color:var(--ink);
  border:1px solid var(--line);
}

.mini-map-wrap{ border-radius: var(--radius-sm); overflow:hidden; border:1px solid var(--line); margin: 10px 0 14px; }
.mini-map{ width:100%; height:190px; }

.schedule-list{ list-style:none; margin:0; padding:0; }
.schedule-list li{
  display:flex; gap:12px; padding:9px 0; border-bottom:1px dashed var(--line);
  font-size:13px;
}
.schedule-list li:last-child{ border-bottom:none; }
.schedule-time{ flex:0 0 108px; color:var(--lake-deep); font-weight:600; font-size:12.5px; }

.drive-leg{
  display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft);
  padding:6px 0;
}
.drive-leg .num{ color:var(--clay); font-size:18px; font-weight:700; }

.hint-box{
  background: rgba(139,94,60,.09);
  border:1px dashed rgba(139,94,60,.35);
  border-radius: var(--radius-sm);
  padding: 12px 14px; font-size:12.5px; color:var(--ink-soft); line-height:1.8;
  margin-top: 10px;
}
.hint-box b{ color:var(--timber); }

/* ---------- 天气卡片 ---------- */
.weather-card{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background: linear-gradient(135deg, rgba(46,108,142,.10), rgba(155,135,181,.10));
  border:1px solid var(--line); border-radius: var(--radius-sm);
  padding: 14px; margin-bottom: 12px;
}
.weather-left{ display:flex; align-items:center; gap:12px; }
.weather-icon{ width:40px; height:40px; }
.weather-temp{ font-family:'Caveat', cursive; font-size:30px; line-height:1; }
.weather-loc{ font-size:12.5px; color:var(--ink-soft); }
.weather-sub{ font-size:11.5px; color:var(--ink-soft); }
.weather-refresh{
  border:1px solid var(--line); background:#fff; border-radius:999px;
  font-size:11.5px; padding:6px 10px; color:var(--ink); white-space:nowrap;
}
.weather-status{ font-size:11px; color:var(--ink-soft); margin-top:2px; }

/* ---------- 定位/导航条 ---------- */
.nav-strip{
  border:1px solid var(--line); border-radius: var(--radius-sm);
  padding: 12px 14px; margin-bottom: 12px;
  background: var(--paper-3);
}
.nav-strip .label{ font-size:11.5px; color:var(--ink-soft); }
.nav-strip .value{ font-size:14.5px; font-weight:700; margin: 2px 0 8px; }
.nav-strip .value .num{ color:var(--clay); font-size:22px; }
.btn-row{ display:flex; gap:8px; flex-wrap:wrap; }
.btn{
  appearance:none; border:none; cursor:pointer;
  font-family:'Noto Sans SC', sans-serif; font-size:12.5px; font-weight:600;
  padding: 9px 14px; border-radius:999px;
  background: var(--ink); color: var(--paper-3);
  display:inline-flex; align-items:center; gap:6px;
}
.btn.secondary{ background:#fff; color:var(--ink); border:1px solid var(--line); }
.btn.ghost{ background:transparent; color:var(--lake-deep); border:1px solid var(--lake); }
.btn:active{ transform: scale(.97); }

.locate-permission{ font-size:11.5px; color:var(--ink-soft); margin-top:6px; }

/* ---------- 住宿总表 ---------- */
.hotel-card{
  display:flex; gap:12px; align-items:flex-start;
  border:1px solid var(--line); border-radius: var(--radius-sm);
  padding: 13px; margin-bottom:12px; background: var(--paper-3);
}
.hotel-day-chip{
  flex:0 0 auto; width:44px; height:44px; border-radius:12px;
  background: var(--paper-2); display:flex; align-items:center; justify-content:center;
  font-family:'Caveat', cursive; font-weight:700; font-size:18px; color: var(--lake-deep);
}
.hotel-info .name{ font-size:14px; font-weight:700; }
.hotel-info .area{ font-size:12px; color:var(--ink-soft); margin: 2px 0 6px; }
.status-badge{
  display:inline-block; font-size:10.5px; padding:2px 8px; border-radius:999px;
  margin-bottom:6px;
}
.status-badge.ok{ background:rgba(107,122,69,.15); color:var(--steppe); }
.status-badge.check{ background:rgba(201,123,90,.15); color:var(--clay); }

/* ---------- 表格 ---------- */
.simple-table{ width:100%; border-collapse:collapse; font-size:12.5px; }
.simple-table th, .simple-table td{
  text-align:left; padding:9px 6px; border-bottom:1px solid var(--line);
}
.simple-table th{ color:var(--ink-soft); font-weight:600; font-size:11.5px; }

/* ---------- 风险卡片 ---------- */
.risk-item{ display:flex; gap:10px; padding:11px 0; border-bottom:1px dashed var(--line); }
.risk-item:last-child{ border-bottom:none; }
.risk-icon{ flex:0 0 auto; width:26px; height:26px; margin-top:2px; }
.risk-text b{ font-size:13px; }
.risk-text p{ margin:4px 0 0; font-size:12px; color:var(--ink-soft); line-height:1.7; }

/* ---------- 分享 ---------- */
.share-bar{ display:flex; gap:10px; margin-top:6px; }

/* ---------- 杂项 ---------- */
.stitch-divider{ height:14px; margin: 6px 0 4px; }
.stitch-divider svg{ width:100%; height:100%; }
.footer-note{ text-align:center; font-size:11px; color:var(--ink-soft); padding: 18px 20px 6px; }

a{ color:inherit; }

/* ============================================================
   v2 视觉升级：图标 / 过渡动效 / 海拔提醒 / 美食推荐 / 倒计时
   ============================================================ */

.icon{ display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; color:inherit; vertical-align:-3px; }
.icon svg{ width:100%; height:100%; display:block; }

/* 卡片阴影升级为双层柔光阴影，更有"浮起来"的轻质感 */
.card, .hotel-card, .weather-card, .nav-strip{
  box-shadow: 0 1px 2px rgba(74,66,56,.06), 0 10px 24px -12px rgba(74,66,56,.18);
}
.card{ padding:20px 18px; }

/* 页面切换淡入动效 */
.page{ animation: fadeInUp .28s ease both; }
@keyframes fadeInUp{
  from{ opacity:0; transform:translateY(6px); }
  to{ opacity:1; transform:translateY(0); }
}

/* 骨架屏（地图/天气加载中）*/
.skeleton{
  background: linear-gradient(90deg, var(--paper-2) 25%, #f5efdd 37%, var(--paper-2) 63%);
  background-size: 400% 100%;
  animation: skeleton-loading 1.4s ease infinite;
}
@keyframes skeleton-loading{ 0%{background-position:100% 50%;} 100%{background-position:0 50%;} }

/* 贯穿全书的缝线路线（页头装饰，串联视觉主线） */
.thread-header{ display:flex; align-items:center; gap:8px; margin: 4px 2px 14px; }
.thread-header svg{ flex:1 1 auto; height:16px; display:block; }
.thread-header .thread-label{
  font-family:'Caveat', cursive; font-size:15px; color:var(--road); white-space:nowrap;
}

/* 海拔提醒卡片 */
.altitude-card{
  display:flex; gap:12px; align-items:flex-start;
  border-radius: var(--radius-sm); padding:13px 14px; margin-bottom:14px;
  border:1px solid transparent;
}
.altitude-card.risk-low{ background: rgba(107,122,69,.10); border-color: rgba(107,122,69,.25); }
.altitude-card.risk-medium{ background: rgba(201,123,90,.10); border-color: rgba(201,123,90,.3); }
.altitude-card.risk-high{ background: rgba(201,123,90,.16); border-color: rgba(201,123,90,.45); }
.altitude-card .icon{ color:var(--timber); margin-top:2px; }
.altitude-card .alt-title{ font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
.altitude-card .alt-range{ font-family:'Caveat', cursive; font-size:17px; color:var(--clay); margin-left:2px; }
.altitude-card .alt-note{ font-size:12px; color:var(--ink-soft); line-height:1.75; margin-top:4px; }
.risk-pill{ font-size:10px; padding:2px 8px; border-radius:999px; font-weight:600; margin-left:auto; flex:0 0 auto; }
.risk-pill.risk-low{ background:rgba(107,122,69,.2); color:var(--steppe); }
.risk-pill.risk-medium{ background:rgba(201,123,90,.22); color:var(--clay); }
.risk-pill.risk-high{ background:rgba(201,123,90,.35); color:#a85c3c; }

/* 美食推荐 */
.food-list{ display:flex; flex-direction:column; gap:10px; }
.food-item{
  display:flex; gap:10px; align-items:flex-start;
  background: var(--paper-3); border:1px solid var(--line); border-radius: var(--radius-sm);
  padding: 11px 13px;
}
.food-item .icon{ color:var(--clay); margin-top:2px; }
.food-item .food-name{ font-size:13px; font-weight:700; }
.food-item .food-desc{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; line-height:1.6; }

/* 封面倒计时徽章 */
.countdown-badge{
  display:inline-flex; align-items:baseline; gap:6px;
  background: var(--ink); color: var(--paper-3);
  padding: 8px 16px; border-radius:999px; margin: 4px auto 0;
  box-shadow: 0 8px 18px -8px rgba(74,66,56,.4);
}
.countdown-badge .num{ font-size:24px; color:#F3D9A4; }
.countdown-badge .txt{ font-size:12.5px; }

/* 图标行内对齐微调（用于替换原本 emoji 出现的位置） */
.inline-icon-text{ display:inline-flex; align-items:center; gap:5px; }
.drive-leg .icon{ color:var(--clay); }
.day-summary .icon, .hint-box .icon{ color:var(--timber); }

/* ============================================================
   v3 视觉与功能样式
   ============================================================ */

/* 底部导航图标化 */
.tab-btn{ display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 12px; }
.tab-btn .icon{ width:17px; height:17px; opacity:.85; }
.tab-btn span.lbl{ font-size:11px; line-height:1; }
.tab-btn.active .icon{ opacity:1; }

/* 封面改版：插画满幅+压字 */
.cover-hero{ position:relative; border-radius:var(--radius-sm); overflow:hidden; margin:6px auto 16px; border:1px solid var(--line); box-shadow: var(--shadow-sm); }
.cover-hero svg{ display:block; width:100%; height:auto; }
.cover-hero .hero-strip{
  position:absolute; left:0; right:0; bottom:0;
  background: linear-gradient(0deg, rgba(74,66,56,.5), rgba(74,66,56,0));
  color:#FDFBF5; font-family:'Caveat', cursive; font-size:15px;
  padding: 22px 12px 8px; text-align:right; letter-spacing:.04em;
}

/* 三天预报行 */
.forecast-row{ display:flex; gap:6px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); width:100%; }
.forecast-day{ flex:1; text-align:center; font-size:10.5px; color:var(--ink-soft); }
.forecast-day .weather-icon{ width:22px; height:22px; margin:2px auto; }
.forecast-day .f-temp{ font-family:'Caveat', cursive; font-size:14px; color:var(--ink); }
.weather-card{ flex-wrap:wrap; }

/* 海拔曲线图 */
.elev-chart{ margin: 4px 0 6px; }
.elev-chart svg{ width:100%; height:auto; display:block; }

/* 每日打卡 */
.checkin-bar{ display:flex; align-items:center; gap:10px; margin:14px 0 4px; }
.btn.checkin{ background: var(--steppe); }
.btn.checkin.done{ background: var(--paper-2); color: var(--steppe); border:1.5px solid var(--steppe); }
.tl-dot.done::after{
  content:""; position:absolute; inset:3px; border-radius:50%;
  background: radial-gradient(circle, #fff 0 35%, transparent 40%);
}
.tl-item.done .tl-title{ text-decoration: line-through; text-decoration-color: rgba(74,66,56,.35); text-decoration-thickness:1.5px; }
.trip-progress{ font-family:'Caveat', cursive; font-size:18px; color:var(--clay); margin: 0 4px 10px; }

/* 行前清单 */
.pack-cat{ margin-bottom: 6px; }
.pack-cat h3{ font-size:14px; margin: 14px 2px 8px; color: var(--lake-deep); display:flex; align-items:center; gap:7px; }
.pack-item{
  display:flex; align-items:center; gap:11px; padding: 10px 4px;
  border-bottom:1px dashed var(--line); font-size:13.5px; cursor:pointer;
  transition: opacity .2s;
}
.pack-item:last-child{ border-bottom:none; }
.pack-box{
  width:21px; height:21px; border-radius:6px; border:1.6px solid var(--road);
  flex:0 0 auto; display:flex; align-items:center; justify-content:center;
  color:transparent; background:#fff; transition: all .15s;
}
.pack-item.checked .pack-box{ background: var(--steppe); border-color: var(--steppe); color:#fff; }
.pack-item.checked .pack-box .icon{ width:13px; height:13px; }
.pack-item.checked span.txt{ opacity:.45; text-decoration: line-through; text-decoration-color: rgba(74,66,56,.4); }
.pack-progress{
  font-size:12px; color:var(--ink-soft); margin: 2px 4px 12px;
}
.pack-progress b{ font-family:'Caveat', cursive; font-size:19px; color:var(--clay); }

/* 应急信息 */
.emg-tel{
  display:flex; align-items:center; justify-content:space-between;
  padding: 11px 4px; border-bottom: 1px dashed var(--line); font-size:13.5px;
}
.emg-tel:last-child{ border-bottom:none; }
.emg-tel a{
  text-decoration:none; background:var(--ink); color:var(--paper-3);
  font-family:'Caveat', cursive; font-size:17px; padding: 4px 14px; border-radius:999px;
}
.emg-note{ font-size:12px; color:var(--ink-soft); line-height:1.8; }

/* 拍照黄金时刻 */
.photo-tip{
  display:flex; gap:12px; align-items:flex-start;
  background: linear-gradient(135deg, rgba(243,217,164,.28), rgba(201,123,90,.10));
  border:1px solid rgba(201,123,90,.28); border-radius: var(--radius-sm);
  padding: 13px 14px; margin-bottom:12px;
}
.photo-tip .icon{ color:var(--clay); margin-top:2px; }
.photo-tip .pt-time{ font-size:12.5px; font-weight:700; color:var(--clay); }
.photo-tip .pt-spot{ font-size:12px; color:var(--ink-soft); line-height:1.75; margin-top:3px; }

/* 车上游戏 */
.game-card{
  background: var(--paper-3); border:1px dashed rgba(46,108,142,.4);
  border-radius: var(--radius-sm); padding: 13px 15px; margin-bottom:12px;
}
.game-card .g-title{ display:flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--lake-deep); margin-bottom:8px; }
.game-card ul{ margin:0; padding-left:18px; font-size:12.5px; color:var(--ink-soft); line-height:2; }

/* 车辆适配路况卡 */
.road-card{
  display:flex; gap:12px; align-items:flex-start;
  border-radius: var(--radius-sm); padding:13px 14px; margin-bottom:14px;
  border:1px solid transparent;
}
.road-card.lv-easy{ background: rgba(46,108,142,.08); border-color: rgba(46,108,142,.25); }
.road-card.lv-medium{ background: rgba(201,123,90,.10); border-color: rgba(201,123,90,.32); }
.road-card .icon{ color:var(--lake-deep); margin-top:2px; }
.road-card.lv-medium .icon{ color:var(--clay); }
.road-card .rd-tag{
  display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px;
  background: rgba(46,108,142,.16); color: var(--lake-deep); margin-bottom:5px;
}
.road-card.lv-medium .rd-tag{ background: rgba(201,123,90,.2); color:#a85c3c; }
.road-card .rd-note{ font-size:12px; color:var(--ink-soft); line-height:1.75; }

/* ============================================================
   装备页 & 每日拍摄机位
   ============================================================ */
.gear-card{background:var(--paper-3);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-sm);padding:18px;margin-bottom:16px;position:relative;overflow:hidden}
.gear-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gc,#2E6C8E)}
.gear-card h3{font-size:16px;margin:0 0 3px;padding-left:6px}
.gear-card .role{font-size:11.5px;color:var(--ink-soft);padding-left:6px;margin-bottom:12px}
.gear-sec{font-size:11px;font-weight:700;color:var(--lake-deep);margin:10px 0 5px;padding-left:6px}
.gear-ops{list-style:none;margin:0;padding:0 0 0 6px}
.gear-ops li{font-size:12.5px;color:var(--ink);line-height:1.6;padding:3px 0 3px 16px;position:relative}
.gear-ops li::before{content:"·";position:absolute;left:4px;color:var(--clay);font-weight:900}
.gear-set{font-size:12px;color:var(--ink-soft);line-height:1.7;background:var(--paper-2);
  border-radius:12px;padding:10px 12px;margin:2px 6px 0}
.gear-best{font-size:12px;color:var(--steppe);font-weight:700;padding:8px 6px 0}
.drone-warn{background:rgba(201,123,90,.12);border:2px dashed rgba(201,123,90,.45);border-radius:14px;
  padding:14px 16px;font-size:12.5px;color:#a85c3c;line-height:1.7;font-weight:600;margin-top:6px}
.checklist{list-style:none;margin:0;padding:0}
.checklist li{display:flex;gap:10px;align-items:flex-start;font-size:13px;padding:9px 0;
  border-bottom:1px dashed var(--line);color:var(--ink)}
.checklist li:last-child{border-bottom:none}
.checklist li::before{content:"☐";color:var(--road);font-size:17px;flex:0 0 auto;line-height:1.2}

/* 每日拍摄机位 */
.shoot-item{background:var(--paper-3);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:13px 15px;margin-bottom:10px}
.shoot-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;margin-bottom:5px}
.shoot-head .cam{width:18px;height:18px;color:var(--clay);flex:0 0 auto}
.shoot-what{font-size:11.5px;color:var(--clay);font-weight:700;margin-bottom:4px}
.shoot-how{font-size:12px;color:var(--ink-soft);line-height:1.7}

/* 解析插画：自定义键 > generic:类型 > 兜底road */
function resolveIllust(key, label){
  if(ILLUST[key]) return ILLUST[key];
  if(key && key.startsWith('generic:')){
    const type = key.split(':')[1];
    if(GENERIC_SCENES[type]) return GENERIC_SCENES[type](label || '');
  }
  return GENERIC_SCENES.road(label || '');
}

function weatherIconFor(code){
  if(code === 0) return WEATHER_ICON.sun;
  if([1,2,3].includes(code)) return WEATHER_ICON.cloud;
  if([45,48].includes(code)) return WEATHER_ICON.cloud;
  if([51,53,55,61,63,65,80,81,82].includes(code)) return WEATHER_ICON.rain;
  if([71,73,75,77,85,86].includes(code)) return WEATHER_ICON.snow;
  if([95,96,99].includes(code)) return WEATHER_ICON.storm;
  return WEATHER_ICON.cloud;
}

<script>

   一家四口新疆伊犁6天亲子自驾电子路书 — 主逻辑

const state = {
  tab: 'cover',
  weatherCache: {},      // poiKey -> {data, ts}
  userLoc: null,         // {lat,lng}
  manualDay: 0,          // 未授权定位时，用户手动选择的天数索引
  geoWatchId: null,
  geoStatus: 'idle'      // idle | asking | granted | denied | error
};

const DAY_TABS = ROUTE_DATA.days.map((d,i)=>({ id:`d${i}`, label:`D${i+1}`, icn:'compass' }));
const TABS = [
  { id:'cover', label:'封面', icn:'home' },

  { id:'drives', label:'车程', icn:'car' },
  { id:'weather', label:'天气', icn:'sunw' },
  { id:'gallery', label:'插画', icn:'brush' },
  { id:'gear', label:'装备', icn:'camera' },
  { id:'emergency', label:'应急', icn:'shield' },
  { id:'risk', label:'Plan B', icn:'warning' },
];

/* ---------------- 工具函数 ---------------- */

function haversineKm(a, b){
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLng = (b.lng - a.lng) * Math.PI/180;
  const la1 = a.lat * Math.PI/180, la2 = b.lat * Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function fmtKm(km){ return km < 10 ? km.toFixed(1) : Math.round(km); }

function etaFromKm(km, speed=45){
  const hours = km / speed;
  const m = Math.round(hours * 60);
  if(m < 60) return `约${m}分钟`;
  return `约${Math.floor(m/60)}小时${m%60 ? (m%60)+'分钟' : ''}`;
}

function poi(key){ return ROUTE_DATA.pois[key]; }

function amapUri(p){
  return `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${encodeURIComponent(p.name)}&mode=car&policy=1&src=yili-roadbook&coordinate=gaode`;
}
function tencentUri(p){
  return `https://apis.map.qq.com/uri/v1/routeplan?type=drive&to=${encodeURIComponent(p.name)}&tocoord=${p.lat},${p.lng}&referer=yili-roadbook`;
}
function bmapUri(p){
  return `https://api.map.baidu.com/direction?destination=latlng:${p.lat},${p.lng}|name:${encodeURIComponent(p.name)}&mode=driving&region=&output=html&src=yili-roadbook`;
}

function navButtons(poiKey){
  const p = poi(poiKey);
  if(!p) return '';
  return `
  <div class="btn-row">
    <a class="btn" href="${amapUri(p)}" target="_blank" rel="noopener">高德导航</a>
    <a class="btn secondary" href="${tencentUri(p)}" target="_blank" rel="noopener">腾讯地图</a>
    <a class="btn secondary" href="${bmapUri(p)}" target="_blank" rel="noopener">百度地图</a>
  </div>`;
}

/* ---------------- 天气（Open-Meteo，免key） ---------------- */

async function fetchWeather(poiKey){
  const cached = state.weatherCache[poiKey];
  if(cached && (Date.now() - cached.ts) < 30*60*1000) return cached.data;
  const p = poi(poiKey);
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&current=temperature_2m,weather_code,wind_speed_10m,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&timezone=Asia%2FShanghai&forecast_days=3`;
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('bad status');
    const json = await res.json();
    state.weatherCache[poiKey] = { data: json, ts: Date.now() };
    return json;
  }catch(err){
    if(cached) return cached.data; // 兜底：用旧缓存
    return null;
  }
}

function renderWeatherCard(poiKey, containerId){
  const p = poi(poiKey);
  const elId = `wx-${containerId}-${poiKey}`;
  const html = `
  <div class="weather-card" id="${elId}">
    <div class="weather-left">
      <div class="weather-icon">${WEATHER_ICON.cloud}</div>
      <div>
        <div class="weather-loc">${p.name}</div>
        <div class="weather-temp">--°</div>
        <div class="weather-sub weather-status">正在获取天气…</div>
      </div>
    </div>
    <button class="weather-refresh" data-refresh="${poiKey}|${containerId}">刷新</button>
    <div class="forecast-row"></div>
  </div>`;
  // 异步填充
  loadWeatherInto(poiKey, elId);
  return html;
}

async function loadWeatherInto(poiKey, elId){
  const json = await fetchWeather(poiKey);
  const el = document.getElementById(elId);
  if(!el) return;
  if(!json){
    el.querySelector('.weather-status').textContent = '天气数据暂不可用，请以出发前当地预报为准';
    return;
  }
  const cur = json.current, daily = json.daily;
  el.querySelector('.weather-icon').innerHTML = weatherIconFor(cur.weather_code);
  el.querySelector('.weather-temp').textContent = `${Math.round(cur.temperature_2m)}°`;
  const hi = Math.round(daily.temperature_2m_max[0]);
  const lo = Math.round(daily.temperature_2m_min[0]);
  const pop = daily.precipitation_probability_max[0];
  const uv = daily.uv_index_max[0];
  el.querySelector('.weather-status').innerHTML =
    `今日 ${lo}°–${hi}° · 风速${Math.round(cur.wind_speed_10m)}km/h · 降水概率${pop}% · 紫外线指数${uv}${uv>=7?'（建议防晒）':''}`;
  // 未来3天迷你预报
  const fc = el.querySelector('.forecast-row');
  if(fc && daily.time && daily.time.length >= 3){
    const dayNames = ['今天','明天','后天'];
    fc.innerHTML = [0,1,2].map(i=>`
      <div class="forecast-day">
        <div>${dayNames[i]}</div>
        <div class="weather-icon">${weatherIconFor(daily.weather_code ? daily.weather_code[i] : 3)}</div>
        <div class="f-temp">${Math.round(daily.temperature_2m_min[i])}°/${Math.round(daily.temperature_2m_max[i])}°</div>
      </div>`).join('');
  }
}

function bindWeatherRefreshButtons(root){
  root.querySelectorAll('[data-refresh]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const [poiKey] = btn.dataset.refresh.split('|');
      delete state.weatherCache[poiKey]; // 强制刷新
      const card = btn.closest('.weather-card');
      card.querySelector('.weather-status').textContent = '刷新中…';
      const elId = card.id;
      await loadWeatherInto(poiKey, elId);
    });
  });
}

/* ---------------- 定位 / 下一站距离 ---------------- */

function requestLocation(onUpdate){
  if(!('geolocation' in navigator)){
    state.geoStatus = 'error';
    onUpdate();
    return;
  }
  state.geoStatus = 'asking';
  onUpdate();
  navigator.geolocation.getCurrentPosition(
    pos=>{
      state.userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      state.geoStatus = 'granted';
      onUpdate();
    },
    err=>{
      state.geoStatus = 'denied';
      onUpdate();
    },
    { enableHighAccuracy:true, timeout:8000, maximumAge:60000 }
  );
}

function renderLocationStrip(dayIdx){
  const day = ROUTE_DATA.days[dayIdx];
  const route = day.route;
  const stripId = `loc-strip-${dayIdx}`;
  return `<div class="nav-strip" id="${stripId}">${locationStripInner(dayIdx)}</div>`;
}

function nextStopFromUserLoc(dayIdx){
  const day = ROUTE_DATA.days[dayIdx];
  const route = day.route;
  if(!state.userLoc || !route.length) return null;
  // 找离用户当前位置最近的点，取其后一个作为“下一站”；若在最后一点之后，则下一站为本日终点
  let nearestIdx = 0, nearestDist = Infinity;
  route.forEach((k,i)=>{
    const d = haversineKm(state.userLoc, poi(k));
    if(d < nearestDist){ nearestDist = d; nearestIdx = i; }
  });
  const nextIdx = Math.min(nearestIdx + 1, route.length - 1);
  const nextKey = route[nextIdx];
  const dist = haversineKm(state.userLoc, poi(nextKey));
  return { key: nextKey, dist };
}

function locationStripInner(dayIdx){
  const day = ROUTE_DATA.days[dayIdx];
  if(state.geoStatus === 'granted' && state.userLoc){
    const next = nextStopFromUserLoc(dayIdx);
    if(!next) return `<div class="label">今天暂无下一站</div>`;
    const p = poi(next.key);
    return `
      <div class="label">当前定位已获取 · 今日下一站</div>
      <div class="value">${p.name} <span class="num">${fmtKm(next.dist)}</span> 公里 · ${etaFromKm(next.dist)}</div>
      ${navButtons(next.key)}
      <div class="locate-permission">位置每次打开页面手动获取一次，如需更新请点击下方“重新定位”。</div>
      <div class="btn-row" style="margin-top:8px"><button class="btn ghost" data-relocate="${dayIdx}">重新定位</button></div>
    `;
  }
  if(state.geoStatus === 'asking'){
    return `<div class="label">正在获取你的位置…</div><div class="value">请在弹窗中允许定位授权</div>`;
  }
  // denied / error / idle → 手动选择起点
  const options = day.route.map((k,i)=>`<option value="${i}">${poi(k).name}</option>`).join('');
  const manualIdx = Math.min(state.manualDay, day.route.length-1);
  const manualKey = day.route[Math.min(manualIdx+1, day.route.length-1)];
  return `
    <div class="label">未获取到定位 · 手动选择你当前所在位置</div>
    <select class="btn secondary" data-manual-select="${dayIdx}" style="margin:6px 0 10px; width:100%">${options}</select>
    <div class="value">下一站：${poi(manualKey).name}</div>
    ${navButtons(manualKey)}
    <div class="btn-row" style="margin-top:8px"><button class="btn" data-relocate="${dayIdx}">尝试自动定位</button></div>
  `;
}

function bindLocationStrip(root, dayIdx){
  const strip = root.querySelector(`#loc-strip-${dayIdx}`);
  if(!strip) return;
  const refresh = ()=>{ strip.innerHTML = locationStripInner(dayIdx); bindLocationStrip(root, dayIdx); };
  const relocateBtn = strip.querySelector('[data-relocate]');
  if(relocateBtn) relocateBtn.addEventListener('click', ()=> requestLocation(refresh));
  const select = strip.querySelector('[data-manual-select]');
  if(select) select.addEventListener('change', (e)=>{ state.manualDay = Number(e.target.value); refresh(); });
}

/* ---------------- 迷你地图（Leaflet + OSM，无需 key） ---------------- */

function renderMiniMapPlaceholder(id){
  return `<div class="mini-map-wrap"><div class="mini-map skeleton" id="${id}"></div></div>`;
}

function drawMiniMap(id, routeKeys){
  const el = document.getElementById(id);
  if(!el || typeof L === 'undefined') return;
  el.classList.remove('skeleton');
  const pts = routeKeys.map(k=>{ const p = poi(k); return [p.lat, p.lng]; });
  const map = L.map(id, { zoomControl:false, attributionControl:false, dragging:true, scrollWheelZoom:false });
  const bounds = L.latLngBounds(pts);
  map.fitBounds(bounds, { padding:[24,24] });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:17 }).addTo(map);
  L.polyline(pts, { color:'#C97B5A', weight:3, dashArray:'6 8' }).addTo(map);
  routeKeys.forEach((k,i)=>{
    const p = poi(k);
    L.circleMarker([p.lat,p.lng], { radius:6, color:'#1F4E68', fillColor:'#2E6C8E', fillOpacity:1, weight:2 })
      .bindTooltip(`${i+1}. ${p.name}`, { permanent:false, direction:'top' })
      .addTo(map);
  });
}


/* ---------------- 轻量本地存储（打卡/清单勾选） ---------------- */
const memStore = {};
function lsGet(key){
  try{ return window.localStorage.getItem(key); }catch(e){ return memStore[key] ?? null; }
}
function lsSet(key, val){
  try{ window.localStorage.setItem(key, val); }catch(e){ memStore[key] = val; }
}
function getCheckins(){ try{ return JSON.parse(lsGet('rb_checkins')||'[]'); }catch(e){ return []; } }
function toggleCheckin(dayIdx){
  const arr = getCheckins();
  const i = arr.indexOf(dayIdx);
  if(i>=0) arr.splice(i,1); else arr.push(dayIdx);
  lsSet('rb_checkins', JSON.stringify(arr));
  return arr;
}
function getPacked(){ try{ return JSON.parse(lsGet('rb_packed')||'{}'); }catch(e){ return {}; } }
function togglePacked(id){
  const obj = getPacked();
  if(obj[id]) delete obj[id]; else obj[id] = 1;
  lsSet('rb_packed', JSON.stringify(obj));
  return obj;
}

/* ---------------- 倒计时 / 缝线页头 ---------------- */

function renderCountdown(){
  const m = ROUTE_DATA.meta;
  if(!m.tripStartISO) return '';
  const now = new Date(); now.setHours(0,0,0,0);
  const start = new Date(m.tripStartISO + 'T00:00:00');
  const end = new Date((m.tripEndISO || m.tripStartISO) + 'T23:59:59');
  const diffDays = Math.ceil((start - now) / 86400000);
  if(diffDays > 0){
    return `<div class="countdown-badge" style="margin-top:14px">${icon('clock',15)} <span class="txt">距离出发还有</span><span class="num">${diffDays}</span><span class="txt">天</span></div>`;
  }
  if(now <= end){
    const dayNum = Math.min(ROUTE_DATA.days.length, Math.floor((now - start) / 86400000) + 1);
    return `<div class="countdown-badge" style="margin-top:14px">${icon('compass',15)} <span class="txt">旅程进行中 · 今天是</span><span class="num">D${dayNum}</span></div>`;
  }
  return `<div class="countdown-badge" style="margin-top:14px">${icon('camera',15)} <span class="txt">旅程已圆满结束</span></div>`;
}

function renderElevChart(){
  // 6天海拔曲线（取每天路线最高点海拔）
  const days = ROUTE_DATA.days;
  const maxElevs = days.map(d => Math.max(...d.route.map(k => (poi(k).elevationM||660))));
  const W=340, H=110, padL=30, padR=14, padT=16, padB=22;
  const maxV = 2800, minV = 500;
  const x = i => padL + i*(W-padL-padR)/(days.length-1);
  const y = v => padT + (1-(v-minV)/(maxV-minV))*(H-padT-padB);
  const pts = maxElevs.map((v,i)=>[x(i), y(v)]);
  const path = pts.map((p,i)=> (i? 'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = path + ` L ${pts[pts.length-1][0].toFixed(1)} ${H-padB} L ${pts[0][0].toFixed(1)} ${H-padB} Z`;
  return `
  <div class="card elev-chart">
    <h3 style="font-size:14px;color:var(--lake-deep)">全程海拔曲线 <span class="num" style="color:var(--clay);font-size:16px">（米）</span></h3>
    <svg viewBox="0 0 ${W} ${H}">
      <line x1="${padL}" y1="${y(1000)}" x2="${W-padR}" y2="${y(1000)}" stroke="#e5ddc9" stroke-width="1"/>
      <line x1="${padL}" y1="${y(2000)}" x2="${W-padR}" y2="${y(2000)}" stroke="#e5ddc9" stroke-width="1"/>
      <text x="${padL-4}" y="${y(1000)+3}" font-size="8" fill="#9C9284" text-anchor="end">1000</text>
      <text x="${padL-4}" y="${y(2000)+3}" font-size="8" fill="#9C9284" text-anchor="end">2000</text>
      <path d="${area}" fill="rgba(46,108,142,.12)"/>
      <path d="${path}" fill="none" stroke="#2E6C8E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map((p,i)=>`
        <circle cx="${p[0]}" cy="${p[1]}" r="3.6" fill="#F6F1E4" stroke="${days[i].colorTag}" stroke-width="2.2"/>
        <text x="${p[0]}" y="${H-8}" font-size="9" fill="#6b6154" text-anchor="middle">D${i+1}</text>
        <text x="${p[0]}" y="${p[1]-8}" font-size="8.5" fill="#C97B5A" text-anchor="middle" font-weight="bold">${maxElevs[i]}</text>
      `).join('')}
    </svg>
    <div class="section-sub" style="margin:4px 0 0">取每天途经最高点。D3-D5 连续三晚在 1900 米以上，是需要留意孩子状态的区间。</div>
  </div>`;
}

  bar.innerHTML = TABS.map(t=>`<button class="tab-btn ${t.id===state.tab?'active':''}" data-tab="${t.id}">${icon(t.icn,17)}<span class="lbl">${t.label}</span></button>`).join('');

function switchTab(tabId){
  state.tab = tabId;
  const root = document.getElementById('page-root');
  const r = RENDERERS[tabId];
  root.innerHTML = r.html();
  if(r.after) r.after(root);
  bindGlobalButtons(root);
  renderTabbar();
  const activeBtn = document.querySelector('.tab-btn.active');
  if(activeBtn && activeBtn.scrollIntoView) activeBtn.scrollIntoView({ block:'nearest', inline:'center', behavior:'smooth' });
  window.scrollTo({ top:0, behavior:'instant' });
}

function bindGlobalButtons(root){
  const shareBtn = root.querySelector('#btn-share');
  const copyBtn = root.querySelector('#btn-copy');
  if(shareBtn) shareBtn.addEventListener('click', doShare);
  if(copyBtn) copyBtn.addEventListener('click', doCopy);
}

async function doShare(){
  const shareData = {
    title: ROUTE_DATA.meta.title,
    text: ROUTE_DATA.meta.subtitle,
    url: location.href
  };
  if(navigator.share){
    try{ await navigator.share(shareData); }catch(e){ /* 用户取消 */ }
  }else{
    doCopy();
  }
}
function doCopy(){
  navigator.clipboard?.writeText(location.href).then(()=>{
    alert('链接已复制，发给家人后在浏览器/微信中打开即可查看～');
  }).catch(()=>{
    prompt('复制以下链接分享给家人：', location.href);
  });
}

/* ---------------- 初始化 ---------------- */

document.addEventListener('DOMContentLoaded', ()=>{
  renderTabbar();
  switchTab('cover');
});

</script>
</body>
</html>
