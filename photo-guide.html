<style>

:root{
  --ink:#4A4238;--ink-soft:#6b6154;--paper:#F6F1E4;--paper-2:#EEE6D3;--paper-3:#F9F5EA;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Noto Sans SC',sans-serif;color:var(--ink);background:#2b2620}
.hand{font-family:'Ma Shan Zheng',cursive}.cav{font-family:'Caveat',cursive}

.viewport{position:fixed;inset:0;max-width:560px;margin:0 auto;overflow:hidden;background:var(--paper)}
#stage{display:flex;height:100%;will-change:transform}
.card{flex:0 0 100%;height:100%;position:relative;overflow-y:auto;overflow-x:hidden;
  background:radial-gradient(1000px 700px at 12% -6%, color-mix(in srgb, var(--bg) 15%, #fbf7ec) 0%, transparent 55%),var(--paper)}
.card::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.42;
  background-image:radial-gradient(rgba(74,66,56,.04) 1px,transparent 1px);background-size:3px 3px}
.inner{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;padding:52px 24px 92px}

.topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:4px;background:rgba(0,0,0,.08);max-width:560px;margin:0 auto}
.topfill{height:100%;width:0;background:linear-gradient(90deg,var(--lake),var(--clay));transition:width .42s}

/* 封面 */
.cover{justify-content:center;text-align:center;align-items:center}
.cover .washi{width:200px;height:44px;background:rgba(46,108,142,.28);border:2px solid rgba(46,108,142,.45);
  transform:rotate(-2deg);margin-bottom:26px}
.cover .eyebrow{font-family:'Caveat',cursive;font-size:22px;color:var(--lake-deep)}
.cover h1{font-family:'Ma Shan Zheng',cursive;font-size:46px;line-height:1.3;margin:10px 0}
.cover .sub{font-size:14px;color:var(--ink-soft);line-height:1.9;max-width:320px}
.cover .cam{font-size:60px;margin:20px 0}
.cover .note{font-size:11.5px;color:var(--road);margin-top:22px;max-width:300px;line-height:1.7}
.cover .swipe{position:absolute;bottom:34px;left:0;right:0;text-align:center;font-family:'Caveat',cursive;
  font-size:17px;color:var(--road);animation:breathe 2.2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}

/* 日间隔页 */
.divider{justify-content:center;text-align:center;align-items:center}
.divider .dtag{font-family:'Ma Shan Zheng',cursive;font-size:34px;color:#fff;padding:10px 32px;border-radius:18px;background:var(--bg)}
.divider h2{font-family:'Ma Shan Zheng',cursive;font-size:56px;margin:20px 0 8px;color:var(--ink)}
.divider .dsub{font-size:14px;color:var(--ink-soft)}
.divider .dcount{font-family:'Caveat',cursive;font-size:20px;color:var(--road);margin-top:16px}

/* 机位卡 */
.spot-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.spot-day{font-family:'Caveat',cursive;font-size:20px;color:var(--bg);font-weight:700}
.spot-star{font-size:15px;color:var(--clay);margin-left:auto}
.spot-name{font-family:'Ma Shan Zheng',cursive;font-size:38px;line-height:1.2;color:var(--ink)}
.spot-tagline{font-size:14px;color:var(--clay);font-weight:700;margin:4px 0 18px}

.field{background:var(--paper-3);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;
  position:relative;overflow:hidden}
.field::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--fc,var(--lake))}
.field .flabel{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:900;margin-bottom:6px;color:var(--fc,var(--lake-deep))}
.field .fic{width:18px;height:18px;flex:0 0 auto}
.field .ftext{font-size:13.5px;color:var(--ink);line-height:1.65}
.field .ftext b{color:var(--clay)}
.field.arrive{--fc:#2E6C8E}
.field.position{--fc:#6B7A45}
.field.time{--fc:#C97B5A}
.field.gear{--fc:#8B5E3C}
.field.param{--fc:#9B87B5}
.field.tip{--fc:#C0392B;background:#FBF3EC;border-color:rgba(201,123,90,.35)}

.tips-page h2{font-family:'Ma Shan Zheng',cursive;font-size:40px;text-align:center;margin-bottom:8px}
.tips-page .tsub{font-size:13px;color:var(--ink-soft);text-align:center;margin-bottom:24px}
.tip-item{display:flex;gap:14px;align-items:flex-start;background:var(--paper-3);border:1px solid var(--line);

.tip-item .td{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-top:3px}
.tips-page .foot{text-align:center;font-family:'Ma Shan Zheng',cursive;font-size:26px;color:var(--ink);margin-top:20px}

.dots{position:fixed;bottom:0;left:0;right:0;z-index:30;max-width:560px;margin:0 auto;
  display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap;

.dot{border:none;background:transparent;cursor:pointer;padding:5px 7px;border-radius:8px;
  font-size:10.5px;color:var(--road);font-family:'Caveat',cursive;font-weight:700;transition:all .2s;white-space:nowrap}
.dot.active{background:var(--ink);color:var(--paper-3)}
</style>

          tip: "伊宁市区整体禁飞（机场净空），无人机务必收好别飞；预留还车值机时间"
        }
      ]
    }
  ],
  tips: [
    { icon: "🌅", t: "新疆日落晚", d: "夏季约21:00后落日，黄金一小时要等到20:30左右，别按内地时间安排" },
    { icon: "🚁", t: "无人机必报备", d: "赛湖扫码、特克斯到警务站登记、其他问当地；机场/边境/县城核心禁飞，违规没收+罚款" },
    { icon: "🔋", t: "高原掉电快", d: "三台机电池多备、贴身保暖；每天回酒店导素材+全部充满" },
    { icon: "🎒", t: "景区大带干粮", d: "喀拉峻等景区极大、餐饮少且贵，自备水+零食+巧克力，穿舒适徒步鞋" },
    { icon: "🌡️", t: "一天有四季", d: "草原天气多变，洋葱式穿衣：排汗内层+保暖中层+防风外层，防晒三件套必备" }
  ]
};

</script>
<script>
const ICON = {
  arrive:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>`,
  position:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/><circle cx="12" cy="12" r="2.5"/></svg>`,
  time:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l4 2.5"/></svg>`,
  gear:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3.5L9 6h6l1.5 2H20a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.3"/></svg>`,
  param:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="9" cy="6" r="2" fill="currentColor"/><circle cx="15" cy="12" r="2" fill="currentColor"/><circle cx="7" cy="18" r="2" fill="currentColor"/></svg>`,
  tip:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 22 20.5H2z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>`,
};
function ic(n){return `<span class="fic">${ICON[n]}</span>`}
function stars(n){return '★'.repeat(n)+'☆'.repeat(3-n)}

// 构建卡片序列
const cards=[];
cards.push({type:'cover'});
SHOOT_DATA.days.forEach((d,di)=>{
  cards.push({type:'divider',day:d});
  d.spots.forEach(sp=>cards.push({type:'spot',day:d,spot:sp}));
});
cards.push({type:'tips'});

let idx=0;
function render(c){
  if(c.type==='cover'){
    return `<div class="inner cover" style="--bg:#2F6E8E">
      <div class="washi"></div>
      <div class="eyebrow">photo spots · 6 days</div>
      <div class="cam">📸</div>
      <h1 class="hand">${SHOOT_DATA.meta.title}</h1>
      <div class="sub">${SHOOT_DATA.meta.subtitle}</div>
      <div class="note">${SHOOT_DATA.meta.note}</div>
      <div class="swipe">← 左右滑动翻页 →</div>
    </div>`;
  }
  if(c.type==='divider'){
    const d=c.day;
    return `<div class="inner divider" style="--bg:${d.color}">
      <div class="dtag">${d.id} · ${d.date}</div>
      <h2>${d.theme}</h2>
      <div class="dcount">${d.spots.length} 个机位 →</div>
    </div>`;
  }
  if(c.type==='tips'){
    return `<div class="inner tips-page" style="--bg:#4A4238">
      <h2 class="hand">出片必记</h2>
      <div class="tsub">五条铁律，避开90%的坑</div>
      ${SHOOT_DATA.tips.map(t=>`<div class="tip-item"><span class="te">${t.icon}</span><div><div class="tt">${t.t}</div><div class="td">${t.d}</div></div></div>`).join('')}
      <div class="foot">等光线 · 错人流 · 找机位 · 稳节奏</div>
    </div>`;
  }
  // spot
  const d=c.day, sp=c.spot;
  return `<div class="inner" style="--bg:${d.color}">
    <div class="spot-head">
      <span class="spot-day">${d.id} · ${d.date}</span>
      <span class="spot-star">${stars(sp.star)}</span>
    </div>
    <div class="spot-name hand">${sp.name}</div>
    <div class="spot-tagline">${sp.tagline}</div>
    <div class="field arrive"><div class="flabel">${ic('arrive')} 怎么到达</div><div class="ftext">${sp.arrive}</div></div>
    <div class="field position"><div class="flabel">${ic('position')} 机位在哪</div><div class="ftext">${sp.position}</div></div>
    <div class="field time"><div class="flabel">${ic('time')} 什么时间</div><div class="ftext">${sp.time}</div></div>
    <div class="field gear"><div class="flabel">${ic('gear')} 用哪台机</div><div class="ftext">${sp.gear}</div></div>
    <div class="field param"><div class="flabel">${ic('param')} 参数建议</div><div class="ftext">${sp.param}</div></div>
    <div class="field tip"><div class="flabel">${ic('tip')} 避坑提示</div><div class="ftext">${sp.tip}</div></div>
  </div>`;
}

function mount(){
  const stage=document.getElementById('stage');
  stage.innerHTML=cards.map((c,i)=>`<section class="card" data-i="${i}" style="--bg:${c.type==='spot'||c.type==='divider'?c.day.color:'#2F6E8E'}">${render(c)}</section>`).join('');
  const dots=document.getElementById('dots');
  dots.innerHTML=cards.map((c,i)=>{
    let label=c.type==='cover'?'封面':c.type==='tips'?'必记':c.type==='divider'?c.day.id:'●';
    return `<button class="dot" data-i="${i}">${label}</button>`;
  }).join('');
  dots.querySelectorAll('.dot').forEach(b=>b.addEventListener('click',()=>go(+b.dataset.i)));
  go(0,true);bindGestures();
}
function go(i,instant){
  i=Math.max(0,Math.min(cards.length-1,i));idx=i;
  const stage=document.getElementById('stage');
  stage.style.transition=instant?'none':'transform .42s cubic-bezier(.22,.61,.36,1)';
  stage.style.transform=`translateX(${-i*100}%)`;
  document.querySelectorAll('.dot').forEach((d,di)=>d.classList.toggle('active',di===i));
  document.getElementById('topfill').style.width=(cards.length>1?i/(cards.length-1)*100:100)+'%';
  if(instant)requestAnimationFrame(()=>{stage.style.transition='transform .42s cubic-bezier(.22,.61,.36,1)'});
  // 切换卡片时回到该卡顶部
  const cur=document.querySelector(`.card[data-i="${i}"]`); if(cur)cur.scrollTop=0;
}
function next(){go(idx+1)}function prev(){go(idx-1)}
function bindGestures(){
  const stage=document.getElementById('stage');let x0=null,y0=null,drag=false;
  stage.addEventListener('touchstart',e=>{const t=e.touches[0];x0=t.clientX;y0=t.clientY;drag=true},{passive:true});
  stage.addEventListener('touchmove',e=>{if(!drag||x0===null)return;const t=e.touches[0];const dx=t.clientX-x0,dy=t.clientY-y0;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10&&e.cancelable)e.preventDefault()},{passive:false});
  stage.addEventListener('touchend',e=>{if(!drag||x0===null)return;const t=e.changedTouches[0];const dx=t.clientX-x0,dy=t.clientY-y0;drag=false;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){dx<0?next():prev()}x0=null});
  stage.addEventListener('click',e=>{if(e.target.closest('a,button'))return;const r=stage.getBoundingClientRect();(e.clientX-r.left>r.width/2)?next():prev()});
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev()});
}
document.addEventListener('DOMContentLoaded',mount);
</script>
</body>
